router:
  progress_template: "/data/ipc/progress/router/{id:02d}.json"
  crawler_dir_template: "/data/ipc/crawl_result/crawler_{id:02d}"
  ingestor_dir_template: "/data/ipc/crawl_result/ingestor_{id:02d}"
  stats_dir: "/data/ipc/stats"
  interval_minutes: 10

  num_shards: 256
  shards_per_ingestor: 16

  # Pin top-traffic domains 32 apart so each lands on a distinct ingestor.
  # eTLD+1 overrides are also the fallback shard for non-whitelisted
  # subdomains (whitelist lives in shard_split.yaml).
  domain_overrides:
    wikipedia.org: 0
    x.com: 32
    youtube.com: 64
    reddit.com: 96
    instagram.com: 128
    espn.com: 160
    facebook.com: 192
    yahoo.com: 224

ingestor:
  progress_template: "/data/ipc/progress/ingestor/{id:02d}.json"
  result_dir_template: "/data/ipc/crawl_result/ingestor_{id:02d}"
  stats_dir: "/data/ipc/stats"
  interval_minutes: 10

extractor:
  progress_template: "/data/ipc/progress/extractor/{id:02d}.json"
  result_dir_template: "/data/ipc/crawl_result/ingestor_{id:02d}"
  stats_dir: "/data/ipc/stats"
  interval_minutes: 10

stats:
  stats_dir: "/data/ipc/stats"
  bad_dir: "/data/ipc/stats/bad"

postgres:
  dsn: "postgresql+psycopg2://crawler:crawler@172.16.191.1:5432/crawlerdb"

selectdb:
  dsn: "postgresql://select:select@172.16.191.1:5444/selectdb"
  enabled: true
  html_dir: "/data/ipc/html/selectdb"

golden_discovery_ranker_v1:
  # Optional inline scoring for newly discovered URLs. Keep disabled until the
  # artifact is mounted in scheduler_ingest; the background ranker can still
  # score rows later when this is false.
  ingest_inline_enabled: false
  artifact_path: "/app/artifacts/golden_discovery_ranker_v1.joblib"
